
<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Bài tập 19 - Bài Thi JS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .portfolio-container {
            text-align: center;
            padding: 20px;
        }
        .btn-link {
            display: inline-block;
            padding: 12px 25px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        .btn-link:hover {

        }
        .preview-frame {

            height: 600px;
            border: 2px solid #ddd;
            border-radius: 8px;

        }

<body>

        <h2>Kết quả Bài tập 19</h2>

            <a href="https://alislee2544.github.io/my-portfolio./" target="_blank" class="btn-link">
                🚀 Truy cập trực tiếp trang Portfolio của em
            </a>

            <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">

            <h4 style="margin-bottom: 15px; color: #555;">Khung xem trước (Preview)</h4>
