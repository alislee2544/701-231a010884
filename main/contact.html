<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ - Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Quay lại Menu</a>
        <h1>LIÊN HỆ VỚI TÔI</h1>
        
        <form action="#" method="GET" style="max-width: 500px; margin: 0 auto;">
            <div class="form-group">
                <label for="contactName">Họ và tên của bạn</label>
                <input type="text" id="contactName" placeholder="Nhập tên..." required>
            </div>
            
            <div class="form-group">
                <label for="contactEmail">Email liên hệ</label>
                <input type="email" id="contactEmail" placeholder="Nhập email..." required>
            </div>
            
            <div class="form-group">
                <label for="contactMessage">Nội dung lời nhắn</label>
                <textarea id="contactMessage" rows="5" placeholder="Bạn muốn nhắn gửi điều gì?" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; resize: vertical;"></textarea>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;" onclick="alert('Cảm ơn bạn! Lời nhắn đã được ghi nhận.')">Gửi Tin Nhắn</button>
        </form>
    </div>
</body>
</html>
