<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài tập 3 - Đếm ngược</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>Bài tập 3: Đồng hồ đếm ngược</h2>
        <a href="index.html">⬅ Quay lại Trang chủ</a>
        <hr><br>

        <div class="timer-controls" style="text-align: center; margin-top: 20px;">
            <label for="time-input" style="font-weight: bold; font-size: 1.2rem;">Nhập thời gian (phút): </label>
            <input type="number" id="time-input" min="1" value="10" style="padding: 8px; width: 80px; font-size: 1.1rem; border-radius: 4px; border: 1px solid #ccc; text-align: center;">
            <button id="start-timer-btn" class="btn-submit" style="font-size: 1.1rem; margin-left: 10px;">Bắt đầu đếm</button>
        </div>

        <div id="timer-display" class="timer-display">
            00:00
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
